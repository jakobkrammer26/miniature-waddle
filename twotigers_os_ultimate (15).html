<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TwoTigers OS - Ultimate Tiger Edition</title>
    <style>
        /* ==========================================================================
           GLOBAL REGISTRY & THEME VARIABLES (PURE TIGER NEON GLOW)
           ========================================================================== */
        :root {
            --accent: #ff6a00;
            --accent-glow: rgba(255, 106, 0, 0.45);
            --accent-dark: #b34700;
            --bg-base: #060301;
            --bg-dark: #0f0703;
            --bg-glass: rgba(18, 10, 5, 0.88);
            --bg-glass-heavy: rgba(8, 4, 2, 0.95);
            --border-glow: rgba(255, 106, 0, 0.25);
            --text-main: #ffffff;
            --text-muted: #a69890;
            --shadow-neon: 0 0 20px var(--accent-glow), 0 0 40px rgba(255, 106, 0, 0.1);
        }

        /* Reset & Base Rules */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
            user-select: none;
            -webkit-user-drag: none;
        }

        body {
            height: 100vh;
            background: radial-gradient(circle at 50% 110%, #301400 0%, #060301 70%, #000000 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--text-main);
            overflow: hidden;
            position: relative;
        }

        /* Cyber Tiger Stripes Background Grid Effect */
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: repeating-linear-gradient(45deg, rgba(0, 0, 0, 0.2), rgba(0, 0, 0, 0.2) 60px, rgba(255, 106, 0, 0.015) 60px, rgba(255, 106, 0, 0.015) 120px);
            pointer-events: none;
            z-index: 1;
        }

        /* Custom Scrollbars */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.5);
        }
        ::-webkit-scrollbar-thumb {
            background: var(--accent-dark);
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: var(--accent);
        }

        /* ==========================================================================
           LOCK SCREEN / STARTSEITE (AUTHENTICATION INTERFACE)
           ========================================================================== */
        #lock-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(4, 2, 1, 0.98);
            backdrop-filter: blur(40px);
            -webkit-backdrop-filter: blur(40px);
            z-index: 999999;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.4s ease, transform 0.4s ease;
        }

        .lock-container {
            text-align: center;
            background: rgba(255, 106, 0, 0.02);
            padding: 50px 60px;
            border-radius: 30px;
            border: 1px solid rgba(255, 106, 0, 0.15);
            box-shadow: 0 30px 100px rgba(0, 0, 0, 0.9), 0 0 30px rgba(255, 106, 0, 0.05);
            max-width: 500px;
            width: 90%;
        }

        .lock-logo {
            font-size: 80px;
            margin-bottom: 15px;
            filter: drop-shadow(0 0 20px var(--accent-glow));
            animation: pulseTiger 3s infinite ease-in-out;
        }

        @keyframes pulseTiger {
            0%, 100% { transform: scale(1); filter: drop-shadow(0 0 15px var(--accent-glow)); }
            50% { transform: scale(1.05); filter: drop-shadow(0 0 30px var(--accent)); }
        }

        .lock-container h1 { 
            font-size: 38px; 
            margin-bottom: 10px; 
            font-weight: 900; 
            color: var(--accent);
            text-shadow: var(--shadow-neon);
            letter-spacing: 1.5px;
        }

        .lock-container p {
            color: var(--text-muted);
            margin-bottom: 25px;
            font-size: 14px;
        }
        
        .pin-wrapper {
            position: relative;
            margin-bottom: 20px;
        }

        .pin-input {
            background: rgba(0, 0, 0, 0.8);
            border: 1px solid rgba(255, 106, 0, 0.35);
            padding: 15px;
            border-radius: 12px;
            color: var(--accent);
            font-size: 28px;
            text-align: center;
            width: 200px;
            letter-spacing: 6px;
            outline: none;
            box-shadow: inset 0 0 15px rgba(255, 106, 0, 0.1);
            transition: all 0.3s;
        }

        .pin-input:focus {
            border-color: #ff6a00;
            box-shadow: 0 0 15px rgba(255, 106, 0, 0.3), inset 0 0 15px rgba(255,106,0,0.2);
        }

        .lock-btn {
            background: linear-gradient(135deg, #ff6a00, #ff8533);
            color: black;
            border: none;
            padding: 14px 28px;
            font-weight: 800;
            border-radius: 12px;
            cursor: pointer;
            width: 100%;
            transition: all 0.2s;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 13px;
        }

        .lock-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 25px rgba(255, 106, 0, 0.5);
        }

        .lock-err-msg {
            color: #ff4a4a;
            margin-top: 15px;
            font-size: 13px;
            font-weight: bold;
            opacity: 0;
            transition: opacity 0.3s;
        }

        /* ==========================================================================
           MAIN MONITOR / ARBEITSFLÄCHE
           ========================================================================== */
        .desktop {
            width: 96%;
            height: 94%;
            border-radius: 25px;
            background: rgba(8, 4, 2, 0.3);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 106, 0, 0.12);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.8);
            z-index: 10;
        }

        /* Topbar Header */
        .topbar {
            height: 45px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 25px;
            font-size: 13px;
            font-weight: 700;
            border-bottom: 1px solid rgba(255, 106, 0, 0.15);
            background: rgba(0, 0, 0, 0.7);
            color: var(--accent);
            text-shadow: 0 0 5px rgba(255, 106, 0, 0.2);
            z-index: 1000;
        }

        .main {
            flex: 1;
            position: relative;
            padding: 20px;
        }

        /* Background Dashboard Widgets */
        .desktop-widgets {
            position: absolute;
            top: 25%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            pointer-events: none;
            z-index: 1;
        }

        .clock { 
            font-size: 96px; 
            font-weight: 100; 
            line-height: 1; 
            color: white;
            text-shadow: 0 0 25px rgba(255, 106, 0, 0.35);
        }
        .date { 
            font-size: 18px; 
            opacity: 0.6; 
            margin-top: 10px; 
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* Notification Toast Container */
        #notification-container {
            position: absolute;
            top: 60px;
            right: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 99999;
            pointer-events: none;
        }

        .notification-toast {
            background: rgba(10, 5, 2, 0.95);
            border: 1.5px solid var(--accent);
            box-shadow: var(--shadow-neon);
            color: #fff;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            pointer-events: auto;
            transform: translateX(120%);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .notification-toast.show {
            transform: translateX(0);
        }

        /* ==========================================================================
           MULTIPLE-WINDOW CAPSULES ENGINE (DYNAMISCHER WINDOW MANAGER)
           ========================================================================== */
        .window {
            position: absolute;
            background: var(--bg-glass);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-radius: 16px;
            border: 1px solid rgba(255, 106, 0, 0.28);
            box-shadow: 0 35px 80px rgba(0, 0, 0, 0.95);
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
            z-index: 20;
            min-width: 320px;
            min-height: 240px;
        }

        .window.focused {
            border-color: var(--accent);
            box-shadow: 0 35px 90px rgba(0, 0, 0, 0.95), 0 0 25px rgba(255, 106, 0, 0.15);
            z-index: 100 !important;
        }

        .window-header {
            background: rgba(255, 106, 0, 0.04); 
            padding: 12px 16px;
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            cursor: move;
            border-bottom: 1px solid rgba(255, 106, 0, 0.18);
        }

        .window-dots { display: flex; gap: 8px; }
        .dot { width: 12px; height: 12px; border-radius: 50%; cursor: pointer; }
        .dot-close { background: #ff5f56; border: 1px solid rgba(0,0,0,0.1); }
        .dot-max { background: #febc2e; border: 1px solid rgba(0,0,0,0.1); }
        .window-title { font-size: 12px; color: var(--accent); font-weight: 800; text-transform: uppercase; }
        .window-content { flex-grow: 1; width: 100%; height: calc(100% - 40px); overflow: auto; color: #fff; position: relative; }
        .window-resize { position: absolute; bottom: 0; right: 0; width: 16px; height: 16px; cursor: se-resize; z-index: 999; }

        /* ==========================================================================
           APP STYLES ARCHITECTURE
           ========================================================================== */
        /* Mail client */
        .mail-layout { display: flex; height: 100%; background: var(--bg-base); }
        .mail-sidebar { width: 180px; background: rgba(0, 0, 0, 0.4); border-right: 1px solid rgba(255, 106, 0, 0.12); padding: 15px; display: flex; flex-direction: column; gap: 8px; }
        .mail-folder-btn { background: transparent; border: 1px solid transparent; color: var(--text-muted); padding: 8px 12px; border-radius: 8px; text-align: left; font-weight: 600; cursor: pointer; font-size: 13px; }
        .mail-folder-btn.active, .mail-folder-btn:hover { background: rgba(255, 106, 0, 0.08); border-color: rgba(255, 106, 0, 0.2); color: var(--accent); }
        .mail-main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
        .mail-composer { padding: 20px; display: flex; flex-direction: column; gap: 12px; height: 100%; overflow-y: auto; }
        .mail-row { display: flex; flex-direction: column; gap: 5px; }
        .mail-row label { font-size: 11px; color: var(--accent); font-weight: 800; text-transform: uppercase; }
        .mail-row input, .mail-row textarea { background: rgba(0, 0, 0, 0.75); border: 1px solid rgba(255, 106, 0, 0.25); border-radius: 8px; padding: 10px; color: var(--text-main); outline: none; font-size: 13px; }
        .mail-row textarea { resize: none; height: 120px; flex-grow: 1; }
        .mail-attachments-zone { border: 1.5px dashed rgba(255, 106, 0, 0.3); border-radius: 10px; padding: 15px; text-align: center; background: rgba(255, 106, 0, 0.02); cursor: pointer; }
        .mail-attachments-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 10px; margin-top: 10px; }
        .attachment-pill { background: rgba(255, 106, 0, 0.08); border: 1px solid rgba(255, 106, 0, 0.22); padding: 6px 10px; border-radius: 8px; display: flex; align-items: center; justify-content: space-between; font-size: 11px; }
        .mail-console { background: #000; border-top: 1px solid rgba(255, 106, 0, 0.2); padding: 10px 15px; height: 120px; overflow-y: auto; font-family: monospace; font-size: 11px; color: #ffaa00; display: none; }
        .mail-list-view { padding: 15px; overflow-y: auto; height: 100%; }
        .mail-list-item { background: rgba(255, 106, 0, 0.03); border: 1px solid rgba(255, 106, 0, 0.1); border-radius: 8px; padding: 12px; margin-bottom: 8px; }
        .mail-list-subject { font-weight: bold; color: var(--accent); font-size: 13px; }
        .mail-list-meta { display: flex; justify-content: space-between; font-size: 11px; color: var(--text-muted); margin-top: 5px; }

        /* Synth */
        .synth-layout { padding: 20px; background: var(--bg-base); height: 100%; display: flex; flex-direction: column; gap: 15px; }
        .synth-screen { background: #000000; border: 1.5px solid rgba(255, 106, 0, 0.25); border-radius: 12px; height: 110px; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; }
        .synth-visualizer { width: 100%; height: 100%; position: absolute; top: 0; left: 0; z-index: 1; }
        .synth-title-overlay { position: absolute; top: 10px; left: 15px; font-size: 10px; color: var(--accent); font-family: monospace; }
        .synth-parameters { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; }
        .synth-deck-box { background: rgba(0,0,0,0.4); border: 1px solid rgba(255, 106, 0, 0.15); border-radius: 10px; padding: 12px; }
        .synth-deck-box h4 { font-size: 11px; text-transform: uppercase; color: var(--accent); margin-bottom: 10px; border-bottom: 1px solid rgba(255,106,0,0.1); }
        .synth-control-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; font-size: 12px; }
        .synth-control-row label { width: 80px; font-size: 11px; color: #aaa; }
        .synth-control-row input[type="range"] { flex: 1; accent-color: #ff6a00; }

        /* Browser */
        .browser-container { display: flex; flex-direction: column; height: 100%; background: #0d0805; }
        .browser-bar { display: flex; align-items: center; gap: 10px; padding: 10px 14px; background: rgba(15, 8, 4, 0.9); border-bottom: 1px solid rgba(255, 106, 0, 0.2); }
        .browser-nav-btns { display: flex; gap: 6px; }
        .browser-nav-btn { background: rgba(255, 106, 0, 0.05); border: 1px solid rgba(255, 106, 0, 0.2); color: #ff6a00; width: 32px; height: 32px; border-radius: 8px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .browser-address-wrapper { flex: 1; position: relative; display: flex; align-items: center; }
        .browser-secure-icon { position: absolute; left: 12px; color: #4cd964; font-size: 11px; }
        .browser-address-input { width: 100%; background: rgba(0, 0, 0, 0.7); border: 1px solid rgba(255, 106, 0, 0.25); padding: 8px 12px 8px 32px; border-radius: 8px; color: #fff; font-size: 13px; outline: none; }
        .browser-go-btn { background: linear-gradient(135deg, #ff6a00, #ff8533); color: black; border: none; padding: 0 16px; height: 36px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .browser-shortcuts { display: flex; align-items: center; gap: 8px; padding: 8px 14px; background: rgba(10, 5, 2, 0.95); border-bottom: 1px solid rgba(255, 106, 0, 0.1); overflow-x: auto; }
        .browser-shortcut-label { font-size: 11px; color: var(--text-muted); text-transform: uppercase; font-weight: bold; }
        .browser-shortcut-pill { background: rgba(255, 106, 0, 0.05); border: 1px solid rgba(255, 106, 0, 0.15); color: var(--text-muted); padding: 4px 12px; border-radius: 20px; font-size: 11px; cursor: pointer; white-space: nowrap; }
        .browser-shortcut-pill.active, .browser-shortcut-pill:hover { color: #fff; border-color: #ff6a00; background: rgba(255, 106, 0, 0.15); }
        .browser-viewport-wrapper { flex: 1; position: relative; background: #ffffff; }
        .browser-loading-bar { position: absolute; top: 0; left: 0; height: 3px; width: 0%; background: linear-gradient(90deg, #ff3c00, #ffaa00); box-shadow: 0 0 8px #ff6a00; z-index: 10; transition: width 0.3s ease; }
        .browser-view-frame { width: 100%; height: 100%; border: none; background: white; }

        /* Editor */
        .editor-container { padding: 15px; height: 100%; display: flex; flex-direction: column; gap: 10px; background: var(--bg-base); }
        .editor-toolbar { display: flex; flex-wrap: wrap; gap: 8px; padding: 8px; background: rgba(0, 0, 0, 0.5); border-radius: 10px; border: 1px solid rgba(255, 106, 0, 0.2); align-items: center; }
        .editor-toolbar select, .editor-tool-btn { background: #000; border: 1px solid rgba(255, 106, 0, 0.3); color: #fff; padding: 6px 10px; border-radius: 6px; font-size: 11px; outline: none; cursor: pointer; }
        .editor-tool-btn:hover { border-color: var(--accent); background: rgba(255, 106, 0, 0.12); }
        .editor-textarea { flex-grow: 1; background: rgba(0, 0, 0, 0.5); border: 1px solid rgba(255, 106, 0, 0.2); border-radius: 8px; color: #fff; padding: 12px; font-size: 14px; resize: none; outline: none; }
        .editor-statusbar { display: flex; justify-content: space-between; font-size: 11px; color: var(--text-muted); padding: 4px; border-top: 1px solid rgba(255, 106, 0, 0.1); }
        .tiger-btn { background: #ff6a00; border: none; padding: 10px; color: black; border-radius: 8px; font-weight: bold; cursor: pointer; text-transform: uppercase; font-size: 11px; }

        /* Files, Calc, Terminal, Game, Messenger */
        .files-layout { display: flex; flex-direction: column; height: 100%; background: var(--bg-base); }
        .files-toolbar { height: 40px; background: rgba(0,0,0,0.4); border-bottom: 1px solid rgba(255,106,0,0.12); display: flex; align-items: center; padding: 0 15px; gap: 10px; }
        .files-grid { flex: 1; display: grid; grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); gap: 15px; padding: 20px; overflow-y: auto; }
        .file-item { display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 10px; border-radius: 8px; cursor: pointer; border: 1px solid transparent; }
        .file-item:hover { background: rgba(255, 106, 0, 0.08); border-color: rgba(255, 106, 0, 0.2); }
        .file-item-icon { font-size: 32px; margin-bottom: 6px; }
        .file-item-name { font-size: 11px; color: var(--text-main); word-break: break-all; }
        
        .calc-layout { padding: 15px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; height: 100%; background: rgba(0,0,0,0.3); }
        .calc-screen { grid-column: span 4; background: #000; text-align: right; padding: 12px; font-size: 24px; font-family: monospace; border-radius: 8px; border: 1px solid rgba(255,106,0,0.2); color: #ff6a00; }
        .calc-btn { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,106,0,0.1); color: white; padding: 12px; font-size: 18px; font-weight: bold; border-radius: 6px; cursor: pointer; }
        .calc-btn.op { background: rgba(255,106,0,0.2); color: #ff6a00; }
        
        .terminal-container { background: #000; height: 100%; padding: 15px; font-family: monospace; font-size: 13px; color: #00ff00; display: flex; flex-direction: column; position: relative; }
        .terminal-history { flex-grow: 1; overflow-y: auto; margin-bottom: 10px; }
        .terminal-prompt-line { display: flex; align-items: center; gap: 8px; }
        .terminal-input { flex-grow: 1; background: transparent; border: none; outline: none; color: #00ff00; font-family: monospace; font-size: 13px; }
        .matrix-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 999; display: none; }
        
        .game-layout { background: #000; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 10px; }
        .game-canvas-wrapper { position: relative; background: #111; border: 2px solid var(--accent); border-radius: 8px; overflow: hidden; width: 480px; height: 320px; }
        .game-hud { display: flex; justify-content: space-between; width: 100%; max-width: 480px; padding: 5px; font-size: 12px; color: var(--accent); font-family: monospace; }
        .padded-content { padding: 20px; }

        /* Systemsteuerung Panel */
        .settings-grid { display: grid; grid-template-columns: 1fr; gap: 15px; padding: 20px; }
        .settings-card { background: rgba(0,0,0,0.4); border: 1px solid rgba(255,106,0,0.15); border-radius: 12px; padding: 15px; }
        .settings-card h4 { color: var(--accent); margin-bottom: 10px; font-size: 14px; text-transform: uppercase; }
        .stat-bar-bg { background: rgba(255,255,255,0.05); height: 8px; border-radius: 4px; overflow: hidden; margin-top: 6px; }
        .stat-bar-fill { background: var(--accent); width: 0%; height: 100%; box-shadow: 0 0 8px var(--accent); transition: width 0.5s ease; }

        /* TigerAI Styling */
        @keyframes pulse {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; color: var(--accent); }
        }

        /* Messenger Design */
        .messenger-layout {
            display: flex;
            height: 100%;
            background: var(--bg-base);
        }
        .messenger-sidebar {
            width: 170px;
            background: rgba(0, 0, 0, 0.45);
            border-right: 1px solid rgba(255, 106, 0, 0.15);
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        .messenger-channel-btn {
            background: transparent;
            border: 1px solid transparent;
            color: var(--text-muted);
            padding: 8px 12px;
            border-radius: 8px;
            text-align: left;
            font-weight: 600;
            cursor: pointer;
            font-size: 12px;
            width: 100%;
            transition: all 0.2s;
        }
        .messenger-channel-btn.active, .messenger-channel-btn:hover {
            background: rgba(255, 106, 0, 0.08);
            border-color: rgba(255, 106, 0, 0.2);
            color: var(--accent);
        }
        .messenger-main {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 15px;
            gap: 10px;
        }
        .messenger-chat-history {
            flex-grow: 1;
            overflow-y: auto;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 106, 0, 0.15);
            border-radius: 10px;
            padding: 12px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* ==========================================================================
           LOCK / STATUS DOCK UNTEN
           ========================================================================== */
        .dock-wrapper { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); z-index: 10000; pointer-events: none; }
        .dock { background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(35px); -webkit-backdrop-filter: blur(35px); padding: 12px 22px; border-radius: 24px; display: flex; gap: 16px; border: 1px solid rgba(255, 106, 0, 0.32); box-shadow: 0 15px 40px rgba(0,0,0,0.85); pointer-events: auto; }
        .dock-item { width: 52px; height: 52px; border-radius: 14px; background: rgba(255, 106, 0, 0.05); border: 1px solid rgba(255, 106, 0, 0.1); display: flex; justify-content: center; align-items: center; font-size: 26px; cursor: pointer; transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275); position: relative; }
        .dock-item:hover { transform: scale(1.28) translateY(-12px); background: rgba(255, 106, 0, 0.18); border-color: var(--accent); }
        .dock-indicator { position: absolute; bottom: 4px; left: 50%; transform: translateX(-50%); width: 4px; height: 4px; border-radius: 50%; background: var(--accent); box-shadow: 0 0 5px var(--accent); display: none; }
    </style>
</head>

        // Helper to escape HTML tags in chat responses
        function escapeHtml(text) {
            return text
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        // Secure, lightweight client-side markdown interpreter
        function markdownToHtml(text) {
            let html = escapeHtml(text);
            html = html.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
            html = html.replace(/\*(.*?)\*/g, '<em>$1</em>');
            html = html.replace(/\n/g, '<br>');
            html = html.replace(/`(.*?)`/g, '<code style="background:rgba(0,0,0,0.35); padding:2px 5px; border-radius:4px; font-family:monospace;">$1</code>');
            return html;
        }

        // --- TOAST NOTIFICATIONS ---
        function showNotification(message, type = 'info') {
            const container = document.getElementById("notification-container");
            if (!container) return;
            const toast = document.createElement("div");
            toast.className = `notification-toast ${type}`;
            let icon = "🔔";
            if (type === 'success') icon = "✅";
            if (type === 'error') icon = "❌";
            if (type === 'warning') icon = "⚠️";
            toast.innerHTML = `<span>${icon}</span> <span>${message}</span>`;
            container.appendChild(toast);
            setTimeout(() => { toast.classList.add("show"); }, 10);
            setTimeout(() => {
                toast.classList.remove("show");
                setTimeout(() => { toast.remove(); }, 350);
            }, 4000);
        }

            const input = document.getElementById("lock-pin");

            } else {

                showNotification("Zugriff verweigert: PIN inkorrekt.", "error");
            }
            input.value = "";
        }

        function postSpawnInitialization(type, id) {
            if (type === 'music') {
                const canvas = document.getElementById(`canvas-${id}`);
                if (canvas) {
                    activeSynthsVisualizers[id] = { canvas, ctx: canvas.getContext("2d") };
                    drawSynthVisualizerFrame(id);
                }
            } else if (type === 'files') {
                renderVirtualFiles(id);
            } else if (type === 'terminal') {
                updateTerminalPrompt(id);
            } else if (type === 'messenger') {
                initializeMessenger(id);
            } else if (type === 'settings') {
                // Live Hardware simulation ticker loop
                const hardwareInterval = setInterval(() => {
                    const cpuText = document.getElementById(`stat-cpu-${id}`);
                    const cpuBar = document.getElementById(`bar-cpu-${id}`);
                    const ramText = document.getElementById(`stat-ram-${id}`);
                    const ramBar = document.getElementById(`bar-ram-${id}`);
                    
                    if (!cpuText) { clearInterval(hardwareInterval); return; }

                    let cpuVal = Math.floor(Math.random() * 45) + 5;
                    let ramVal = (Math.random() * 0.4 + 1.2).toFixed(2);
                    let ramPct = (ramVal / 64) * 100 * 10; 

                    cpuText.textContent = `${cpuVal}%`;
                    cpuBar.style.width = `${cpuVal}%`;
                    ramText.textContent = `${ramVal} GB / 64 GB`;
                    ramBar.style.width = `${ramPct}%`;
                }, 1000);
            }
        }

        // --- MAIL APP CONTROLS ---
        function handleMailAttachments(capsuleId, files) {
            const container = document.getElementById(`attach-container-${capsuleId}`);
            if(!virtualAttachmentsDatabase[capsuleId]) virtualAttachmentsDatabase[capsuleId] = [];
            for (let i = 0; i < files.length; i++) {
                const file = files[i];
                const reader = new FileReader();
                
                reader.onload = function(e) {
                    const fileObj = {
                        name: file.name,
                        size: (file.size / 1024).toFixed(1) + ' KB',
                        data: e.target.result,
                        type: file.type
                    };
                    
                    if (!virtualAttachmentsDatabase[capsuleId]) {
                        virtualAttachmentsDatabase[capsuleId] = [];
                    }
                    virtualAttachmentsDatabase[capsuleId].push(fileObj);
                    
                    const pill = document.createElement("div");
                    pill.className = "attachment-pill";
                    pill.innerHTML = `<span>📁 ${fileObj.name} (${fileObj.size})</span>`;
                    container.appendChild(pill);
                };
                reader.readAsDataURL(file);
            }
        }

        function sendMailto(capsuleId) {
            const to = document.getElementById(`mail-to-${capsuleId}`).value;
            const subject = document.getElementById(`mail-subject-${capsuleId}`).value;
            let body = document.getElementById(`mail-body-${capsuleId}`).value;

            // Metadaten der Anhänge an den E-Mail-Text anhängen
            const attachments = virtualAttachmentsDatabase[capsuleId] || [];
            if (attachments.length > 0) {
                body += "\n\n--- Dateianhänge (Simuliert über Kapselsystem) ---\n";
                attachments.forEach(file => {
                    body += `Anhang: ${file.name} (Größe: ${file.size})\n`;
                });
            }

            window.location.href = `mailto:${to}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
        }

        function sendSimulatedMail(capsuleId) {
            const consoleBox = document.getElementById(`mail-console-${capsuleId}`);
            const to = document.getElementById(`mail-to-${capsuleId}`).value;
            if (!to) { showNotification("Empfänger fehlt!", "warning"); return; }
            consoleBox.style.display = "block"; consoleBox.innerHTML = "";
            const logs = ["Verbindung mit SMTP Server herstellen...", "CONNECTED: 220 mail.twotigers.net", "EHLO client", "MAIL FROM: <user@twotigers.net>", `RCPT TO: <${to}>`, "DATA", "Sending Packet-Payload...", "250 2.0.0 Ok: queued", "QUIT"];
            let index = 0;
            function runLog() {
                if (index < logs.length) {
                    consoleBox.innerHTML += `<div>&gt; ${logs[index]}</div>`;
                    consoleBox.scrollTop = consoleBox.scrollHeight; index++;
                    setTimeout(runLog, 250);
                } else {
                    setTimeout(() => {
                        consoleBox.style.display = "none";
                        showNotification("E-Mail über SMTP Server übermittelt!", "success");
                    }, 1000);
                }
            }
            runLog();
        }

        // --- MATH RECK SYNTH PIPELINE ---
        function drawSynthVisualizerFrame(id) {
            const item = activeSynthsVisualizers[id]; if (!item) return;
            const { canvas, ctx } = item;
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = "rgba(255, 106, 0, 0.4)"; ctx.lineWidth = 2; ctx.beginPath();
            for (let x = 0, i = 0; x < canvas.width; x += 5, i++) {
                let y = canvas.height / 2;
                if (activeSynths[id]) y += Math.sin(x * 0.05 + Date.now() * 0.02) * 20;
                if (x === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
            }
            ctx.stroke();
            requestAnimationFrame(() => drawSynthVisualizerFrame(id));
        }

        function toggleCapsuleSynth(id) {
            initAudioContext();
            const btn = document.getElementById("play-btn-" + id);
            const style = document.getElementById("wave-" + id).value;
            if (activeSynths[id]) {
                clearInterval(activeSynths[id]); delete activeSynths[id]; btn.textContent = "Starten ▶️";
            } else {
                btn.textContent = "Stoppen ⏸️"; let step = 0;
                activeSynths[id] = setInterval(() => {
                    let v = parseFloat(document.getElementById("vol-" + id).value) || 0.2;
                    if (style === "cyber") playSynthSound([110, 147, 165, 196][step % 4], "sawtooth", 0.1, 0.3, v);
                    if (style === "ambient") if(step % 4 === 0) playSynthSound(82, "triangle", 0.4, 1.0, v);
                    if (style === "chiptune") playSynthSound([261, 329, 392, 523][step % 4], "square", 0.05, 0.2, v);
                    if (style === "alarm") playSynthSound((step % 2 === 0) ? 600 : 400, "sawtooth", 0.05, 0.2, v);
                    step++;
                }, 200);
            }
        }

        function playSynthSound(freq, type, attack, release, vol) {
            if (!globalAudioCtx) return;
            let osc = globalAudioCtx.createOscillator(); let gainNode = globalAudioCtx.createGain();
            osc.type = type; osc.frequency.setValueAtTime(freq, globalAudioCtx.currentTime);
            gainNode.gain.setValueAtTime(0, globalAudioCtx.currentTime);
            gainNode.gain.linearRampToValueAtTime(vol, globalAudioCtx.currentTime + attack);
            gainNode.gain.exponentialRampToValueAtTime(0.0001, globalAudioCtx.currentTime + attack + release);
            osc.connect(gainNode); gainNode.connect(globalAudioCtx.destination);
            osc.start(); osc.stop(globalAudioCtx.currentTime + attack + release);
        }

        // --- TERMINAL ENGINE PACK (WITH COMPLETED MATRIX SCREENSAVER) ---
        function updateTerminalPrompt(id) {
            const path = terminalPaths[id] || "/";
            document.querySelector(`#terminal-wrap-${id} .terminal-prompt-line span`).textContent = `tiger@root:${path}~$`;
        }
        
        function handleTerminalCommand(event, id) {
            if (event.key === 'Enter') {
                const inp = document.getElementById(`term-input-${id}`); const hist = document.getElementById(`term-history-${id}`);
                if (!inp || !inp.value.trim()) return;
                
                const origCmd = inp.value.trim();
                const path = terminalPaths[id] || "/";
                hist.innerHTML += `<div>tiger@root:${path}~$ ${escapeHtml(origCmd)}</div>`;
                
                executeShellCommand(origCmd, id, (response) => {
                    if (response) {
                        hist.innerHTML += `<div>${response}</div>`;
                    }
                    inp.value = ""; 
                    hist.scrollTop = hist.scrollHeight; 
                    updateTerminalPrompt(id);
                });
            }
        }

        function executeShellCommand(cmdString, id, callback) {
            const parts = cmdString.trim().split(/\s+/);
            const cmd = parts[0].toLowerCase();
            const arg1 = parts[1];
            const arg2 = parts.slice(2).join(' ');
            const currentPath = terminalPaths[id] || "/";

            switch(cmd) {
                case 'help':
                    callback(`Befehle:<br>
                            - <span style="color:var(--accent);">ls</span>: Listet das Verzeichnis auf<br>
                            - <span style="color:var(--accent);">cd [ordner]</span>: Wechselt in einen Unterordner<br>
                            - <span style="color:var(--accent);">pwd</span>: Zeigt den aktuellen Pfad an<br>
                            - <span style="color:var(--accent);">mkdir [name]</span>: Erstellt einen Ordner<br>
                            - <span style="color:var(--accent);">touch [datei]</span>: Erstellt eine leere Textdatei<br>
                            - <span style="color:var(--accent);">write [datei] [text]</span>: Schreibt Text in eine Datei<br>
                            - <span style="color:var(--accent);">cat [datei]</span>: Gibt den Inhalt einer Datei aus<br>
                            - <span style="color:var(--accent);">rm [name]</span>: Löscht Dateien oder Ordner<br>
                            - <span style="color:var(--accent);">theme [orange/cyan/green/purple/pink]</span>: Ändert die Akzentfarbe<br>
                            - <span style="color:var(--accent);">sysinfo</span>: Hardware-Spezifikationen<br>
                            - <span style="color:var(--accent);">clear</span>: Leert die Terminal-Historie<br>
                            - <span style="color:var(--accent);">ping [host]</span>: Testet die Verbindung<br>
                            - <span style="color:var(--accent);">matrix</span>: Startet den Code-Regen (Doppelklick zum Beenden)<br>
                            - <span style="color:var(--accent);">hack</span>: Startet das Sicherheits-Bypass-Spiel<br>
                            - <span style="color:var(--accent);">solve [1-100]</span>: Knackt die Firewall-Frequenz beim Hacken<br>
                            - <span style="color:var(--accent);">synth</span>: Spielt einen Sinus-Testton ab`);
                    return;
                case 'pwd':
                    callback(currentPath);
                    return;
                case 'ls':
                    if (currentPath === "/") {
                        let out = "";
                        for (let folder in virtualFileSystem) {
                            out += `<span style="color:#ffaa00; font-weight:bold;">📁 ${folder}</span><br>`;
                        }
                        callback(out || "Keine Ordner vorhanden.");
                    } else {
                        const dirName = currentPath.substring(1);
                        const folderObj = virtualFileSystem[dirName];
                        if (folderObj) {
                            let out = "";
                            for (let file in folderObj) {
                                out += `<span style="color:#fff;">📄 ${file}</span><br>`;
                            }
                            callback(out || "<span style='color:var(--text-muted);'>[Ordner leer]</span>");
                        } else {
                            callback("<span style='color:#ff4a4a'>Fehler: Pfad ungültig.</span>");
                        }
                    }
                    return;
                case 'cd':
                    if (!arg1) {
                        callback("<span style='color:#ff4a4a'>Syntax: cd [Ordner / ..]</span>");
                        return;
                    }
                    if (arg1 === "..") {
                        terminalPaths[id] = "/";
                        callback("");
                    } else {
                        if (currentPath !== "/") {
                            callback("<span style='color:#ff4a4a'>Fehler: Navigiere zuerst mit 'cd ..' ins Stammverzeichnis zurück.</span>");
                        } else {
                            let targetFolder = null;
                            for (let folder in virtualFileSystem) {
                                if (folder.toLowerCase() === arg1.toLowerCase()) {
                                    targetFolder = folder;
                                    break;
                                }
                            }
                            if (targetFolder) {
                                terminalPaths[id] = "/" + targetFolder;
                                callback("");
                            } else {
                                callback(`<span style='color:#ff4a4a'>Fehler: Ordner '${arg1}' nicht gefunden.</span>`);
                            }
                        }
                    }
                    return;
                case 'mkdir':
                    if (!arg1) {
                        callback("<span style='color:#ff4a4a'>Syntax: mkdir [Ordnername]</span>");
                        return;
                    }
                    if (currentPath !== "/") {
                        callback("<span style='color:#ff4a4a'>Fehler: Neue Ordner können nur im Stammverzeichnis '/' erstellt werden.</span>");
                        return;
                    }
                    if (virtualFileSystem[arg1]) {
                        callback("<span style='color:#ff4a4a'>Fehler: Ordner existiert bereits.</span>");
                        return;
                    }
                    virtualFileSystem[arg1] = {};
                    saveFS();
                    callback(`Ordner <span style="color:var(--accent); font-weight:bold;">${arg1}</span> erfolgreich erstellt.`);
                    return;
                case 'touch':
                    if (!arg1) {
                        callback("<span style='color:#ff4a4a'>Syntax: touch [Dateiname]</span>");
                        return;
                    }
                    if (currentPath === "/") {
                        callback("<span style='color:#ff4a4a'>Fehler: Dateien können nur innerhalb eines Unterordners erstellt werden. Wechsle zuerst mit 'cd [ordner]'.</span>");
                        return;
                    }
                    const subDirName = currentPath.substring(1);
                    if (virtualFileSystem[subDirName][arg1] !== undefined) {
                        callback("<span style='color:#ffaa00'>Datei existiert bereits. Zeitstempel aktualisiert.</span>");
                        return;
                    }
                    virtualFileSystem[subDirName][arg1] = "";
                    saveFS();
                    callback(`Leere Textdatei <span style="color:var(--accent); font-weight:bold;">${arg1}</span> erstellt.`);
                    return;
                case 'write':
                    if (!arg1 || !arg2) {
                        callback("<span style='color:#ff4a4a'>Syntax: write [Dateiname] [Inhaltstext]</span>");
                        return;
                    }
                    if (currentPath === "/") {
                        callback("<span style='color:#ff4a4a'>Fehler: Du musst in einen Unterordner wechseln, um Dateien zu beschreiben.</span>");
                        return;
                    }
                    const activeDir = currentPath.substring(1);
                    virtualFileSystem[activeDir][arg1] = arg2;
                    saveFS();
                    callback(`Daten erfolgreich in <span style="color:var(--accent);">${arg1}</span> geschrieben.`);
                    return;
                case 'cat':
                    if (!arg1) {
                        callback("<span style='color:#ff4a4a'>Syntax: cat [Dateiname]</span>");
                        return;
                    }
                    let foundContent = null;
                    if (currentPath === "/") {
                        for (let folder in virtualFileSystem) {
                            if (virtualFileSystem[folder][arg1] !== undefined) {
                                foundContent = virtualFileSystem[folder][arg1];
                                break;
                            }
                        }
                    } else {
                        const activeDir = currentPath.substring(1);
                        foundContent = virtualFileSystem[activeDir][arg1];
                    }

                    if (foundContent === null || foundContent === undefined) {
                        callback(`<span style='color:#ff4a4a'>Fehler: Datei '${arg1}' nicht gefunden.</span>`);
                    } else {
                        callback(`<div style="color:#00ff00; background:rgba(0,255,0,0.03); border:1px solid rgba(0,255,0,0.2); padding:10px; border-radius:6px; font-family:monospace;">${foundContent}</div>`);
                    }
                    return;
                case 'rm':
                    if (!arg1) {
                        callback("<span style='color:#ff4a4a'>Syntax: rm [Dateiname / Ordnername]</span>");
                        return;
                    }
                    if (currentPath === "/") {
                        if (virtualFileSystem[arg1]) {
                            delete virtualFileSystem[arg1];
                            saveFS();
                            callback(`Ordner '${arg1}' gelöscht.`);
                        } else {
                            callback(`<span style='color:#ff4a4a'>Fehler: '${arg1}' existiert nicht im Hauptverzeichnis.</span>`);
                        }
                    } else {
                        const activeDir = currentPath.substring(1);
                        if (virtualFileSystem[activeDir][arg1] !== undefined) {
                            delete virtualFileSystem[activeDir][arg1];
                            saveFS();
                            callback(`Datei '${arg1}' gelöscht.`);
                        } else {
                            callback(`<span style='color:#ff4a4a'>Fehler: Datei '${arg1}' existiert nicht in diesem Ordner.</span>`);
                        }
                    }
                    return;
                case 'clear':
                    document.getElementById(`term-history-${id}`).innerHTML = "";
                    callback("");
                    return;
                case 'sysinfo':
                    callback(`OS: TwoTigers OS v6.2<br>CPU: TigerNode 24-Thread Node Processor`);
                    return;
                case 'ping':
                    callback(`64 bytes from twotigers.net (185.12.33.25): icmp_seq=1 ttl=64 time=12.4ms`);
                    return;
                case 'neofetch':
                    callback(`<div style="display:flex; gap:15px; font-family:monospace; line-height:1.2;">

        // FULLY FUNCTIONING SCREEN SAVER LOGIC
        function startMatrixScreensaver(id) {
            const canvas = document.getElementById(`matrix-${id}`);
            const wrap = document.getElementById(`terminal-wrap-${id}`);
            if (!canvas || !wrap) return;

            canvas.style.display = "block";
            canvas.width = wrap.clientWidth;
            canvas.height = wrap.clientHeight;

            const ctx = canvas.getContext("2d");
            const columns = Math.floor(canvas.width / 15);
            const drops = Array(columns).fill(1);

            const matrixInterval = setInterval(() => {
                ctx.fillStyle = "rgba(0, 0, 0, 0.05)";
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = "#0f0";
                ctx.font = "15px monospace";

                for (let i = 0; i < drops.length; i++) {
                    const text = String.fromCharCode(33 + Math.random() * 96);
                    ctx.fillText(text, i * 15, drops[i] * 15);

                    if (drops[i] * 15 > canvas.height && Math.random() > 0.975) {
                        drops[i] = 0;
                    }
                    drops[i]++;
                }
            }, 30);

            activeMatrixIntervals[id] = matrixInterval;

            // Double Click to close matrix mode safely
            canvas.ondblclick = () => {
                clearInterval(matrixInterval);
                delete activeMatrixIntervals[id];
                canvas.style.display = "none";
            };
        }

        // ==========================================================================
        // RETRO ARCADE CENTER CORE
        // ==========================================================================
        let activeGames = {};
        function startGameLoop(id) {
            const canvas = document.getElementById(`game-canvas-${id}`); if(!canvas) return;
            const ctx = canvas.getContext("2d");
            activeGames[id] = { score: 0, playerY: 250, obstacleX: 480, running: true };
            window.onkeydown = (e) => { if(e.key === ' ') activeGames[id].playerY -= 60; };
            function frame() {
                let g = activeGames[id]; if(!g || !g.running) return;
                ctx.fillStyle = "#111"; ctx.fillRect(0,0,480,320);
                ctx.fillStyle = "var(--accent)"; ctx.fillRect(40, g.playerY, 25, 25);
                if(g.playerY < 250) g.playerY += 2;
                g.obstacleX -= 4; if(g.obstacleX < -20) { g.obstacleX = 480; g.score += 10; }
                ctx.fillStyle = "#ff2a2a"; ctx.fillRect(g.obstacleX, 255, 20, 20);
                document.getElementById(`game-score-${id}`).textContent = `Score: ${g.score}`;
                if(g.obstacleX > 40 && g.obstacleX < 65 && g.playerY > 230) {
                    ctx.fillStyle = "white"; ctx.font = "20px Arial"; ctx.fillText("GAME OVER", 180, 160); g.running = false; return;
                }
                requestAnimationFrame(frame);
            }
            frame();
        }

        // ==========================================================================
        // TIGER AI SYSTEM SERVICE ENGINE
        // ==========================================================================
        async function askTigerAI(promptText, systemPrompt, callback, errorCallback) {
            const apiKey = ""; // Wird vom Runtime-System automatisch eingespielt
            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`;
            const payload = {
                contents: [{ parts: [{ text: promptText }] }],
                systemInstruction: { parts: [{ text: systemPrompt }] }
            };

            let delay = 1000;
            for (let i = 0; i < 5; i++) {
                try {
                    const response = await fetch(url, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify(payload)
                    });
                    if (response.ok) {
                        const result = await response.json();
                        const text = result.candidates?.[0]?.content?.parts?.[0]?.text;
                        if (text) {
                            callback(text);
                            return;
                        }
                    }
                } catch (e) {
                    // Keine Konsolen-Logs während des Retry-Backoffs wie gefordert
                }
                await new Promise(res => setTimeout(res, delay));
                delay *= 2;
            }
            errorCallback("Fehler bei der Verbindung mit dem Hauptprozessor der TigerAI. Bitte versuche es später noch einmal.");
        }

        // --- OS CLOCK & STATUSBAR ENGINE ---
        function updateOSClock() {
            const now = getSyncDate();
            document.getElementById("top-clock").textContent = now.toLocaleTimeString("de-DE");
            document.getElementById("center-clock").textContent = now.toLocaleTimeString("de-DE", { hour: "2-digit", minute: "2-digit" });

        function makeDraggable(win) {
            const header = win.querySelector('.window-header');
            if (!header) return;

            header.style.cursor = 'move';

            header.addEventListener('mousedown', dragStart);
            header.addEventListener('touchstart', dragStart, { passive: false });

            function dragStart(e) {
                // Dragging ignorieren, wenn interaktive Elemente angeklickt werden
                if (e.target.closest('input, textarea, select, button, a, .dot, .browser-shortcut-pill, .editor-tool-btn')) {
                    return;
                }
                
                // Maximierte Fenster können nicht verschoben werden
                if (win.style.width === "100%") {
                    return;
                }

                bringToFront(win);
                
                if (e.type === 'mousedown') {
                    e.preventDefault();
                }

                const startX = e.type === 'touchstart' ? e.touches[0].clientX : e.clientX;
                const startY = e.type === 'touchstart' ? e.touches[0].clientY : e.clientY;
                
                // Nutzt offsetLeft/offsetTop relativ zur Elternarbeitsfläche, um Sprünge zu verhindern
                const initialX = win.offsetLeft;
                const initialY = win.offsetTop;

                // WICHTIG: Alle iframes deaktivieren, damit Mausereignisse nicht verschluckt werden!
                document.querySelectorAll('iframe').forEach(iframe => {
                    iframe.style.pointerEvents = 'none';
                });

                function dragMove(ev) {
                    if (ev.type === 'touchmove') {
                        ev.preventDefault();
                    }

                    const currentX = ev.type === 'touchmove' ? ev.touches[0].clientX : ev.clientX;
                    const currentY = ev.type === 'touchmove' ? ev.touches[0].clientY : ev.clientY;

                    const dx = currentX - startX;
                    const dy = currentY - startY;

                    let left = initialX + dx;
                    let top = initialY + dy;

                    // Barriere: Nicht über die Topbar ziehen lassen
                    if (top < 0) top = 0; 
                    
                    win.style.left = left + 'px';
                    win.style.top = top + 'px';
                }

                function dragEnd() {
                    // Alle iframes wieder aktivieren
                    document.querySelectorAll('iframe').forEach(iframe => {
                        iframe.style.pointerEvents = 'auto';
                    });

                    document.removeEventListener('mousemove', dragMove);
                    document.removeEventListener('mouseup', dragEnd);
                    document.removeEventListener('touchmove', dragMove);
                    document.removeEventListener('touchend', dragEnd);
                }

                document.addEventListener('mousemove', dragMove);
                document.addEventListener('mouseup', dragEnd);
                document.addEventListener('touchmove', dragMove, { passive: false });
                document.addEventListener('touchend', dragEnd);
            }
        }

        function startResize(e, win) {
            e.preventDefault();
            bringToFront(win);
            
            const startW = parseInt(win.style.width) || win.clientWidth;
            const startH = parseInt(win.style.height) || win.clientHeight;
            
            const startX = e.type === 'touchstart' ? e.touches[0].clientX : e.clientX;
            const startY = e.type === 'touchstart' ? e.touches[0].clientY : e.clientY;

            // WICHTIG: Alle iframes während des Resize deaktivieren
            document.querySelectorAll('iframe').forEach(iframe => {
                iframe.style.pointerEvents = 'none';
            });

            function doResize(ev) {
                if (ev.type === 'touchmove') {
                    ev.preventDefault();
                }
                const currentX = ev.type === 'touchmove' ? ev.touches[0].clientX : ev.clientX;
                const currentY = ev.type === 'touchmove' ? ev.touches[0].clientY : ev.clientY;

                const newWidth = Math.max(320, startW + (currentX - startX));
                const newHeight = Math.max(240, startH + (currentY - startY));

                win.style.width = newWidth + "px";
                win.style.height = newHeight + "px";
            }

            function stopResize() {
                // Alle iframes wieder aktivieren
                document.querySelectorAll('iframe').forEach(iframe => {
                    iframe.style.pointerEvents = 'auto';
                });

                document.removeEventListener('mousemove', doResize);
                document.removeEventListener('mouseup', stopResize);
                document.removeEventListener('touchmove', doResize);
                document.removeEventListener('touchend', stopResize);
            }

            document.addEventListener('mousemove', doResize);
            document.addEventListener('mouseup', stopResize);
            document.addEventListener('touchmove', doResize, { passive: false });
            document.addEventListener('touchend', stopResize);
        }
