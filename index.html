<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WLAN Fernsteuerung mit Code-Kopplung</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            font-family: Arial, sans-serif;
            background-color: #222;
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            user-select: none;
            overflow: hidden;
        }

        @keyframes sireneBlinken {
            0%, 49% { background-color: #ff0000; }
            50%, 100% { background-color: #0000ff; }
        }

        .alarm-aktiv {
            animation: sireneBlinken 0.6s infinite steps(1) !important;
        }

        .auswahl-box {
            text-align: center;
        }

        button {
            padding: 15px 30px;
            font-size: 1.2rem;
            margin: 10px;
            cursor: pointer;
            border: none;
            border-radius: 8px;
            background-color: #007bff;
            color: white;
            font-weight: bold;
        }

        #code-setup {
            display: none;
            text-align: center;
        }

        #code-input {
            font-size: 2rem;
            padding: 10px;
            width: 150px;
            text-align: center;
            border-radius: 8px;
            border: none;
            margin-bottom: 10px;
        }

        #generierter-code {
            font-size: 4rem;
            font-weight: bold;
            color: #ffc107;
            letter-spacing: 5px;
            margin: 20px 0;
        }

        #controller {
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }

        .steuerkreuz {
            display: grid;
            grid-template-columns: repeat(3, 90px);
            grid-template-rows: repeat(3, 90px);
            gap: 10px;
        }

        .ctrl-btn {
            background-color: #444;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2rem;
            border-radius: 10px;
            cursor: pointer;
        }
        .ctrl-btn:active { background-color: #666; }

        .alarm-btn {
            background-color: #dc3545;
            color: white;
            font-size: 1.5rem;
            padding: 20px 40px;
            border-radius: 12px;
            font-weight: bold;
            cursor: pointer;
        }
        .alarm-btn:active { background-color: #bd2130; }
        .stop-btn { background-color: #6c757d; }

        #anzeige {
            display: none;
            text-align: center;
            width: 100%;
        }

        #richtungs-text {
            font-size: 5rem;
            font-weight: bold;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.8);
            margin-bottom: 40px;
        }

        .ipad-notfall-btn {
            background-color: #ff0000;
            color: white;
            font-size: 2rem;
            padding: 30px 60px;
            border: 5px solid white;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
            animation: pulsieren 1.5s infinite;
        }

        @keyframes pulsieren {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        #status {
            position: absolute;
            top: 20px;
            color: #888;
        }
    </style>
</head>
<body>

    <div id="status">Bereit. Bitte Rolle wählen.</div>

    <div id="auswahl" class="auswahl-box">
        <h2>Wähle die Rolle für dieses Gerät:</h2>
        <button onclick="waehleRolle('controller')">Als Controller verbinden</button>
        <button onclick="waehleRolle('anzeige')">Als Anzeige verbinden</button>
    </div>

    <div id="code-setup">
        <div id="controller-code-bereich" style="display:none;">
            <h3>Gib den Code vom iPad ein:</h3>
            <input type="number" id="code-input" placeholder="0000"><br>
            <button onclick="verbindeControllerMitCode()">Koppeln</button>
        </div>
        <div id="anzeige-code-bereich" style="display:none;">
            <h3>Dein Verbindungscode:</h3>
            <div id="generierter-code">----</div>
            <p>Gib diesen Code auf deinem Android-Handy ein.</p>
        </div>
    </div>

    <div id="controller">
        <div class="steuerkreuz">
            <div></div>
            <div class="ctrl-btn" onmousedown="sende('VORWÄRTS')" ontouchstart="sende('VORWÄRTS')">⬆️</div>
            <div></div>
            <div class="ctrl-btn" onmousedown="sende('LINKS')" ontouchstart="sende('LINKS')">⬅️</div>
            <div class="ctrl-btn" style="background: none; font-size: 1rem; cursor:default;">Navi</div>
            <div class="ctrl-btn" onmousedown="sende('RECHTS')" ontouchstart="sende('RECHTS')">➡️</div>
            <div></div>
            <div class="ctrl-btn" onmousedown="sende('RÜCKWÄRTS')" ontouchstart="sende('RÜCKWÄRTS')">⬇️</div>
            <div></div>
        </div>
        
        <div class="alarm-btn" onmousedown="sende('ALARM_AN')" ontouchstart="sende('ALARM_AN')">🚨 ALARM STARTEN</div>
        <div class="alarm-btn stop-btn" onmousedown="sende('ALARM_AUS')" ontouchstart="sende('ALARM_AUS')">🛑 Alarm Stop</div>
    </div>

    <div id="anzeige">
        <div id="richtungs-text">Klicke hier für Audio-Start!</div>
        <div id="notknopf" class="ipad-notfall-btn">🚨 NOTFALL ALARM</div>
    </div>

    <script>
        let socket = null;
        let meineRolle = '';
        let verbindungscode = '';
        
        let audioCtx = null;
        let sirenenInterval = null;
        let oscillator = null;
        let alarmLäuft = false;

        function waehleRolle(rolle) {
            meineRolle = rolle;
            document.getElementById('auswahl').style.display = 'none';
            document.getElementById('code-setup').style.display = 'block';

            if (rolle === 'controller') {
                document.getElementById('controller-code-bereich').style.display = 'block';
                document.getElementById('status').innerText = "Warte auf Code-Eingabe...";
            } else {
                verbindungscode = Math.floor(1000 + Math.random() * 9000).toString();
                document.getElementById('generierter-code').innerText = verbindungscode;
                document.getElementById('anzeige-code-bereich').style.display = 'block';
                baueWebSocketVerbindung(verbindungscode);
            }
        }

        function verbindeControllerMitCode() {
            const eingegebenerCode = document.getElementById('code-input').value;
            if (eingegebenerCode.length !== 4) {
                alert("Bitte einen 4-stelligen Code eingeben!");
                return;
            }
            baueWebSocketVerbindung(eingegebenerCode);
        }

        function baueWebSocketVerbindung(code) {
            document.getElementById('status').innerText = "Verbinde...";
            
            // WECHSEL AUF EINEN FREIEN, STABILEN BACKUP-SERVER (Socketsbay)
            // Jede PIN-Nummer bekommt einen eigenen, privaten Raum
            socket = new WebSocket('wss://socketsbay.com/wss/v2/1/sirenen_raum_' + code + '/');

            socket.onopen = () => {
                document.getElementById('code-setup').style.display = 'none';
                
                if (meineRolle === 'controller') {
                    document.getElementById('controller').style.display = 'flex';
                    document.getElementById('status').innerText = "Gekoppelt! (Raum " + code + ")";
                } else {
                    document.getElementById('anzeige').style.display = 'block';
                    document.getElementById('status').innerText = "Gekoppelt! (Raum " + code + ")";
                    setupIpadAudio();
                }
            };

            socket.onerror = () => { 
                document.getElementById('status').innerText = "Verbindungsfehler! Bitte Seite neu laden."; 
            };
            
            socket.onclose = () => {
                document.getElementById('status').innerText = "Verbindung getrennt. Lade die Seite neu.";
            };

            socket.onmessage = (event) => { verarbeiteBefehl(event.data); };
        }

        function setupIpadAudio() {
            const anzeigeBock = document.getElementById('anzeige');
            const richtungsText = document.getElementById('richtungs-text');
            const nKopf = document.getElementById('notknopf');

            anzeigeBock.addEventListener('click', async (e) => {
                if (!audioCtx) {
                    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                    richtungsText.innerText = "•";
                }
                if (audioCtx.state === 'suspended') { await audioCtx.resume(); }

                if (e.target === nKopf) {
                    if (!alarmLäuft) { loeseAlarmAus(); } else { stoppeAlarm(); }
                }
            });
        }

        function sende(befehl) {
            if (meineRolle === 'controller' && socket && socket.readyState === WebSocket.OPEN) {
                socket.send(befehl);
            }
        }

        function loeseAlarmAus() {
            alarmLäuft = true;
            document.body.classList.add('alarm-aktiv');
            document.getElementById('richtungs-text').innerText = "🚨 NOTFALL 🚨";
            document.getElementById('notknopf').innerText = "🛑 STOP ALARM";
            document.getElementById('notknopf').style.backgroundColor = "#333";
            starteSirenenTon();
        }

        function stoppeAlarm() {
            alarmLäuft = false;
            document.body.classList.remove('alarm-aktiv');
            document.body.style.backgroundColor = '#222';
            document.getElementById('richtungs-text').innerText = "•";
            document.getElementById('notknopf').innerText = "🚨 NOTFALL ALARM";
            document.getElementById('notknopf').style.backgroundColor = "#ff0000";
            stoppeSirenenTon();
        }

        function verarbeiteBefehl(befehl) {
            if (meineRolle !== 'anzeige') return;
            const rText = document.getElementById('richtungs-text');

            if (befehl === 'ALARM_AN') {
                if (!alarmLäuft) loeseAlarmAus();
            } 
            else if (befehl === 'ALARM_AUS') {
                stoppeAlarm();
            } 
            else if (!alarmLäuft) {
                rText.innerText = befehl;

                if (befehl === 'VORWÄRTS') document.body.style.backgroundColor = '#006400';
                if (befehl === 'RÜCKWÄRTS') document.body.style.backgroundColor = '#8B0000';
                if (befehl === 'LINKS') document.body.style.backgroundColor = '#4B0082';
                if (befehl === 'RECHTS') document.body.style.backgroundColor = '#4A3B00';
                
                setTimeout(() => {
                    if (rText.innerText === befehl && !alarmLäuft) {
                        rText.innerText = "•";
                        document.body.style.backgroundColor = '#222';
                    }
                }, 1000);
            }
        }

        function starteSirenenTon() {
            if (!audioCtx) return;
            oscillator = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            oscillator.type = 'sawtooth'; 
            oscillator.frequency.setValueAtTime(650, audioCtx.currentTime);
            gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime); 
            oscillator.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            oscillator.start();

            let hoch = true;
            sirenenInterval = setInterval(() => {
                const frequenz = hoch ? 850 : 550; 
                oscillator.frequency.linearRampToValueAtTime(frequenz, audioCtx.currentTime + 0.1);
                hoch = !hoch;
            }, 300);
        }

        function stoppeSirenenTon() {
            clearInterval(sirenenInterval);
            if (oscillator) { try { oscillator.stop(); } catch(e) {} }
        }
    </script>
</body>
</html>
