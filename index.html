<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roboter Fernsteuerung über Funk</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            font-family: Arial, sans-serif;
            background-color: #222;
            color: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            user-select: none;
            overflow: hidden;
            transition: background-color 0.1s;
        }

        /* 🚨 Alarm: Rot-Blaues Blinken */
        @keyframes sireneBlinken {
            0%, 49% { background-color: #ff0000; }
            50%, 100% { background-color: #0000ff; }
        }
        .alarm-aktiv { animation: sireneBlinken 0.6s infinite steps(1) !important; }

        /* ⬅️ Blinker Links */
        @keyframes blinkenLinks {
            0%, 49% { background: linear-gradient(90deg, #ffcc00 50%, #222 50%); }
            50%, 100% { background: #222; }
        }
        .blinker-links-aktiv { animation: blinkenLinks 0.8s infinite steps(1); }

        /* ➡️ Blinker Rechts */
        @keyframes blinkenRechts {
            0%, 49% { background: linear-gradient(90deg, #222 50%, #ffcc00 50%); }
            50%, 100% { background: #222; }
        }
        .blinker-rechts-aktiv { animation: blinkenRechts 0.8s infinite steps(1); }

        .auswahl-box { text-align: center; }
        
        button {
            padding: 15px 25px; font-size: 1.2rem; margin: 8px; cursor: pointer;
            border: none; border-radius: 8px; background-color: #007bff; color: white; font-weight: bold;
        }

        #anzeige-bereich { display: none; text-align: center; width: 100%; z-index: 10; }
        #controller-bereich { display: none; flex-direction: column; align-items: center; gap: 15px; }
        
        .steuerkreuz {
            display: grid;
            grid-template-columns: repeat(3, 85px);
            grid-template-rows: repeat(3, 85px);
            gap: 10px;
        }
        .touch-btn {
            background-color: #444; display: flex; justify-content: center; align-items: center;
            font-size: 1.8rem; border-radius: 12px; font-weight: bold; cursor: pointer;
        }
        .touch-btn:active { background-color: #666; }
        
        .brems-btn { background-color: #dc3545; grid-column: span 3; height: 60px; font-size: 1.3rem; }
        .brems-btn:active { background-color: #bd2130; }
        
        .funk-btn { background-color: #17a2b8; font-size: 1.1rem; }
        .alarm-touch-btn { background-color: #ffc107; color: black; font-size: 1.1rem; }

        #richtungs-text { font-size: 5rem; font-weight: bold; text-shadow: 2px 2px 10px rgba(0,0,0,0.8); margin-bottom: 20px; }
        #status { position: absolute; top: 20px; color: #888; font-weight: bold; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.4.7/peerjs.min.js"></script>
</head>
<body>

    <div id="status">Lade Funksystem...</div>

    <div id="auswahl" class="auswahl-box">
        <h2>Wähle die Rolle für dieses Gerät:</h2>
        <button onclick="starteAls('controller')">Als Controller (Android Touch Screen)</button>
        <button onclick="starteAls('anzeige')">Als Anzeige (iPad am Roboter)</button>
    </div>

    <div id="controller-bereich">
        <div class="touch-btn brems-btn" 
             onmousedown="sende('BREMSE_AN')" ontouchstart="sende('BREMSE_AN')"
             onmouseup="sende('BREMSE_AUS')" ontouchend="sende('BREMSE_AUS')">🛑 BREMSE HIER</div>
        
        <div class="steuerkreuz">
            <div class="touch-btn funk-btn" onmousedown="sende('BLINKER_L')" ontouchstart="sende('BLINKER_L')">⬅️ BL</div>
            <div class="touch-btn" onmousedown="sende('VORWÄRTS')" ontouchstart="sende('VORWÄRTS')" onmouseup="sende('STOP_FAHREN')" ontouchend="sende('STOP_FAHREN')">⬆️</div>
            <div class="touch-btn funk-btn" onmousedown="sende('BLINKER_R')" ontouchstart="sende('BLINKER_R')">BR ➡️</div>
            
            <div class="touch-btn" onmousedown="sende('LINKS')" ontouchstart="sende('LINKS')" onmouseup="sende('STOP_FAHREN')" ontouchend="sende('STOP_FAHREN')">⬅️</div>
            <div class="touch-btn" style="background:none; font-size:1rem; cursor:default;">Robo</div>
            <div class="touch-btn" onmousedown="sende('RECHTS')" ontouchstart="sende('RECHTS')" onmouseup="sende('STOP_FAHREN')" ontouchend="sende('STOP_FAHREN')">➡️</div>
            
            <div class="touch-btn funk-btn" onmousedown="sende('AUTONOM')" ontouchstart="sende('AUTONOM')">🤖 AUT</div>
            <div class="touch-btn" onmousedown="sende('RÜCKWÄRTS')" ontouchstart="sende('RÜCKWÄRTS')" onmouseup="sende('STOP_FAHREN')" ontouchend="sende('STOP_FAHREN')">⬇️</div>
            <div class="touch-btn alarm-touch-btn" onmousedown="sende('SIRENE')" ontouchstart="sende('SIRENE')">🚨 WIO</div>
        </div>

        <div class="touch-btn" style="background-color: #28a745; width: 275px; height: 55px; font-size: 1.3rem;"
             onmousedown="sende('HUPE_AN')" ontouchstart="sende('HUPE_AN')"
             onmouseup="sende('HUPE_AUS')" ontouchend="sende('HUPE_AUS')">📯 HUPE DRÜCKEN</div>
    </div>

    <div id="anzeige-bereich">
        <div id="richtungs-text">STARTBEREIT</div>
        <p style="color:#ffc107; font-weight:bold; font-size: 1.5rem;">👉 EINMAL HIER DRAUF TIPPEN FÜR SOUND! 👈</p>
    </div>

    <script>
        let meineRolle = '';
        let peer = null;
        let verbindung = null;
        
        // Eindeutige ID, damit sich deine beiden Geräte immer sofort finden
        const RAUM_ID = "roboter_super_funk_raum_9988";

        // Sound-Variablen
        let audioCtx = null;
        let sirenenInterval = null, oscillatorSirene = null, alarmLäuft = false;
        let oscillatorHupe = null, hupeLäuft = false;
        let blinkerInterval = null, blinkerLinks = false, blinkerRechts = false;
        let autonomInterval = null, autonomModus = false;
        let bremseLäuft = false;

        const rText = document.getElementById('richtungs-text');
        document.getElementById('status').innerText = "System bereit. Rolle wählen.";

        function starteAls(rolle) {
            meineRolle = rolle;
            document.getElementById('auswahl').style.display = 'none';
            document.getElementById('status').innerText = "Verbinde mit dem Funknetz...";

            if (rolle === 'anzeige') {
                // Das iPad öffnet den Raum und wartet
                peer = new Peer(RAUM_ID);
                document.getElementById('anzeige-bereich').style.display = 'block';
                
                peer.on('open', () => {
                    document.getElementById('status').innerText = "📡 Signal aktiv! Warte auf Handy...";
                });

                peer.on('connection', (conn) => {
                    verbindung = conn;
                    document.getElementById('status').innerText = "🟢 Gekoppelt mit Handy!";
                    setupEmpfaengerDaten();
                });

                setupAudioKlick();
            } else {
                // Das Android-Handy verbindet sich aktiv mit der iPad-ID
                peer = new Peer();
                document.getElementById('controller-bereich').style.display = 'flex';
                
                peer.on('open', () => {
                    document.getElementById('status').innerText = "Suche iPad...";
                    verbindung = peer.connect(RAUM_ID);
                    
                    verbindung.on('open', () => {
                        document.getElementById('status').innerText = "🟢 Erfolgreich mit iPad gekoppelt!";
                    });
                });
            }
        }

        // Befehl senden (Vom Handy ans iPad)
        function sende(befehl) {
            if (meineRolle === 'controller' && verbindung && verbindung.open) {
                verbindung.send(befehl);
            }
        }

        // Audio aktivieren (Auf dem iPad)
        function setupAudioKlick() {
            document.getElementById('anzeige-bereich').addEventListener('click', async () => {
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                if (audioCtx.state === 'suspended') await audioCtx.resume();
                rText.innerText = "•";
            });
        }

        // Befehle auf dem iPad empfangen und ausführen
        function setupEmpfaengerDaten() {
            verbindung.on('data', (befehl) => {
                if (befehl === 'BREMSE_AN') { starteBremse(); return; }
                if (befehl === 'BREMSE_AUS') { stoppeBremse(); return; }
                
                if (bremseLäuft || (autonomModus && befehl !== 'AUTONOM')) return;

                if (befehl === 'VORWÄRTS') zeigeRichtung('VORWÄRTS', '#006400');
                if (befehl === 'RÜCKWÄRTS') zeigeRichtung('RÜCKWÄRTS', '#8B0000');
                if (befehl === 'LINKS') zeigeRichtung('LINKS', '#4B0082');
                if (befehl === 'RECHTS') zeigeRichtung('RECHTS', '#4A3B00');
                
                if (befehl === 'STOP_FAHREN' && !alarmLäuft && !blinkerLinks && !blinkerRechts && !autonomModus) {
                    allesAusschalten();
                }

                if (befehl === 'AUTONOM') { if (!autonomModus) starteAutonom(); else stoppeAutonom(); }
                if (befehl === 'HUPE_AN' && !hupeLäuft) starteHupe();
                if (befehl === 'HUPE_AUS') stoppeHupe();
                if (befehl === 'BLINKER_L') schalteBlinker('links');
                if (befehl === 'BLINKER_R') schalteBlinker('rechts');
                
                if (befehl === 'SIRENE') {
                    stoppeBlinkerSound(); blinkerLinks = false; blinkerRechts = false;
                    document.body.classList.remove('blinker-links-aktiv', 'blinker-rechts-aktiv');
                    if (!alarmLäuft) starteAlarm(); else stoppeAlarm();
                }
            });
        }

        // --- AKTIONEN (Licht & Sound) ---
        function zeigeRichtung(text, farbe) {
            if (!alarmLäuft) { rText.innerText = text; document.body.style.backgroundColor = farbe; }
        }

        function allesAusschalten() {
            document.body.style.backgroundColor = '#222'; rText.innerText = "•";
            document.body.classList.remove('blinker-links-aktiv', 'blinker-rechts-aktiv', 'alarm-aktiv');
            stoppeBlinkerSound();
        }

        function starteBremse() {
            bremseLäuft = true; if (autonomModus) stoppeAutonom(); stoppeAlarm(); allesAusschalten();
            rText.innerText = "🛑 BREMSE!"; document.body.style.backgroundColor = "#ff1111";
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.type = 'sawtooth'; osc.frequency.setValueAtTime(300, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(80, audioCtx.currentTime + 0.4);
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.4);
            osc.connect(gain); gain.connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime + 0.4);
        }
        function stoppeBremse() { bremseLäuft = false; allesAusschalten(); }

        function starteAutonom() {
            autonomModus = true; stoppeAlarm(); allesAusschalten(); rText.innerText = "🤖 AUTONOM AN";
            autonomInterval = setInterval(() => {
                const aktionen = ['VORWÄRTS', 'LINKS', 'RECHTS', 'HUPE'];
                const zufall = aktionen[Math.floor(Math.random() * aktionen.length)];
                allesAusschalten();
                if (zufall === 'VORWÄRTS') zeigeRichtung('🤖 AUTONOM: VORWÄRTS', '#004d00');
                if (zufall === 'LINKS') { zeigeRichtung('🤖 AUTONOM: LINKS', '#222'); schalteBlinker('links'); }
                if (zufall === 'RECHTS') { zeigeRichtung('🤖 AUTONOM: RECHTS', '#222'); schalteBlinker('rechts'); }
                if (zufall === 'HUPE') { starteHupe(); setTimeout(stoppeHupe, 300); }
            }, 1500);
        }
        function stoppeAutonom() { autonomModus = false; clearInterval(autonomInterval); allesAusschalten(); rText.innerText = "🤖 AUTONOM AUS"; }

        function schalteBlinker(richtung) {
            stoppeBlinkerSound();
            if (richtung === 'links') {
                blinkerRechts = false; document.body.classList.remove('blinker-rechts-aktiv');
                blinkerLinks = !blinkerLinks;
                if (blinkerLinks) { document.body.classList.add('blinker-links-aktiv'); rText.innerText = "⬅️ BLINKER L"; starteBlinkerSound(); }
                else allesAusschalten();
            } else {
                blinkerLinks = false; document.body.classList.remove('blinker-links-aktiv');
                blinkerRechts = !blinkerRechts;
                if (blinkerRechts) { document.body.classList.add('blinker-rechts-aktiv'); rText.innerText = "BLINKER R ➡️"; starteBlinkerSound(); }
                else allesAusschalten();
            }
        }
        function starteBlinkerSound() { if (!audioCtx) return; spieleKlickTon(); blinkerInterval = setInterval(spieleKlickTon, 400); }
        function spieleKlickTon() {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator(); const gain = audioCtx.createGain();
            osc.type = 'triangle'; osc.frequency.setValueAtTime(120, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime); gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.05);
            osc.connect(gain); gain.connect(audioCtx.destination); osc.start(); osc.stop(audioCtx.currentTime + 0.06);
        }
        function stoppeBlinkerSound() { clearInterval(blinkerInterval); }

        function starteHupe() {
            if (!audioCtx) return; hupeLäuft = true;
            oscillatorHupe = audioCtx.createOscillator(); const gainNode = audioCtx.createGain();
            oscillatorHupe.type = 'triangle'; oscillatorHupe.frequency.setValueAtTime(220, audioCtx.currentTime); 
            gainNode.gain.setValueAtTime(0.4, audioCtx.currentTime);
            oscillatorHupe.connect(gainNode); gainNode.connect(audioCtx.destination); oscillatorHupe.start();
        }
        function stoppeHupe() { hupeLäuft = false; if (oscillatorHupe) { try { oscillatorHupe.stop(); } catch(e) {} } }

        function starteAlarm() {
            alarmLäuft = true; document.body.classList.add('alarm-aktiv'); rText.innerText = "🚨 ALARM 🚨";
            if (!audioCtx) return;
            oscillatorSirene = audioCtx.createOscillator(); const gainNode = audioCtx.createGain();
            oscillatorSirene.type = 'sawtooth'; oscillatorSirene.frequency.setValueAtTime(650, audioCtx.currentTime);
            gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime);
            oscillatorSirene.connect(gainNode); gainNode.connect(audioCtx.destination); oscillatorSirene.start();
            let hoch = true;
            sirenenInterval = setInterval(() => {
                const frequenz = hoch ? 850 : 550; oscillatorSirene.frequency.linearRampToValueAtTime(frequenz, audioCtx.currentTime + 0.1);
                hoch = !hoch;
            }, 300);
        }
        function stoppeAlarm() { alarmLäuft = false; clearInterval(sirenenInterval); if (oscillatorSirene) { try { oscillatorSirene.stop(); } catch(e) {} } allesAusschalten(); }
    </script>
</body>
</html>
