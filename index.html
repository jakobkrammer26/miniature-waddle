<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EisdieleBezahlung</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            text-align: center;
            padding: 20px;
            background: #f0f9ff;
            color: #0c4a6e;
            margin: 0;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 20px;
            border: 2px solid #bae6fd;
            box-shadow: 0 4px 15px rgba(2, 132, 199, 0.15);
            max-width: 360px;
            margin: 0 auto;
        }

        h1 { color: #0284c7; margin-top: 0; }
        .amount { font-size: 2.5rem; font-weight: bold; color: #0369a1; margin: 15px 0; }

        button {
            background: #0284c7;
            color: white;
            border: none;
            padding: 16px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 14px;
            width: 100%;
            cursor: pointer;
            margin-top: 10px;
        }

        button:active { background: #0369a1; }

        #interactive {
            width: 100%;
            margin-top: 15px;
            border-radius: 12px;
            overflow: hidden;
        }

        .done {
            background: #dcfce7;
            color: #16a34a;
            padding: 15px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 1.3rem;
            margin-top: 15px;
            display: none;
        }

        .hidden { display: none; }
    </style>
</head>
<body>

<div class="card">
    <h1>🍦 Eisdiele Bezahlen</h1>

    <div id="scan-step">
        <p>Tippe unten, um den QR-Code vom iPad zu scannen:</p>
        <button id="start-btn" onclick="startCamera()">Kamera starten</button>
        <div id="interactive"></div>
    </div>

    <div id="pay-step" class="hidden">
        <p>Zu zahlender Betrag:</p>
        <div class="amount" id="display-amount">0,00 €</div>
        <button onclick="payNow()">Jetzt Bezahlen</button>
    </div>

    <div id="done-msg" class="done">
        ✅ Geld abgebucht!
        <br><br>
        <button style="background:#16a34a;" onclick="resetApp()">Nächste Zahlung</button>
    </div>
</div>

<script>
    let currentTopic = null;
    let html5QrCode = null;

    async function startCamera() {
        document.getElementById('start-btn').style.display = 'none';
        html5QrCode = new Html5Qrcode("interactive");

        const qrCodeSuccessCallback = (decodedText) => {
            try {
                const data = JSON.parse(decodedText);
                if (data.topic && data.amount) {
                    currentTopic = data.topic;
                    document.getElementById('display-amount').innerText = data.amount + ' €';
                    
                    // Kamera stoppen
                    html5QrCode.stop().then(() => {
                        document.getElementById('scan-step').classList.add('hidden');
                        document.getElementById('pay-step').classList.remove('hidden');
                    });
                }
            } catch (e) {
                console.log("Kein gültiger Kassen-Code");
            }
        };

        const config = { fps: 10, qrbox: { width: 220, height: 220 } };

        // Erzwinge die Rückkamera (facingMode: environment)
        html5QrCode.start(
            { facingMode: "environment" }, 
            config, 
            qrCodeSuccessCallback
        ).catch(err => {
            alert("Kamera-Fehler: Bitte schließe andere Kamera-Apps und erlaube den Kamera-Zugriff im Browser.");
            document.getElementById('start-btn').style.display = 'block';
        });
    }

    function payNow() {
        if (!currentTopic) return;

        fetch(`https://ntfy.sh/${currentTopic}`, {
            method: 'POST',
            body: 'PAID'
        }).then(() => {
            document.getElementById('pay-step').classList.add('hidden');
            document.getElementById('done-msg').style.display = 'block';
        });
    }

    function resetApp() {
        document.getElementById('done-msg').style.display = 'none';
        document.getElementById('scan-step').classList.remove('hidden');
        document.getElementById('start-btn').style.display = 'block';
    }
</script>

</body>
</html>
