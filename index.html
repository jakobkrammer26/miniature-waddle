<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eisdiele Bezahlung</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            text-align: center;
            padding: 20px;
            background: #f0f9ff;
            color: #0c4a6e;
            margin: 0;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 20px;
            border: 2px solid #bae6fd;
            box-shadow: 0 4px 15px rgba(2, 132, 199, 0.15);
            max-width: 360px;
            margin: 0 auto;
        }

        h1 { color: #0284c7; margin-top: 0; }

        .balance-box {
            background: #e0f2fe;
            border-radius: 12px;
            padding: 10px;
            margin-bottom: 20px;
            font-weight: bold;
        }

        .balance-amount {
            font-size: 1.5rem;
            color: #0284c7;
        }

        .amount { font-size: 2.2rem; font-weight: bold; color: #0369a1; margin: 15px 0; }

        button {
            background: #0284c7;
            color: white;
            border: none;
            padding: 16px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 14px;
            width: 100%;
            cursor: pointer;
            margin-top: 10px;
        }

        button:active { background: #0369a1; }
        button:disabled { background: #94a3b8; cursor: not-allowed; }

        #interactive {
            width: 100%;
            margin-top: 15px;
            border-radius: 12px;
            overflow: hidden;
        }

        .msg-box {
            padding: 15px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 1.2rem;
            margin-top: 15px;
            display: none;
        }

        .done { background: #dcfce7; color: #16a34a; }
        .error { background: #fee2e2; color: #dc2626; }

        .hidden { display: none; }
    </style>
</head>
<body>

<div class="card">
    <h1>🍦 Eisdiele Guthaben</h1>

    <div class="balance-box">
        Dein Guthaben: <br>
        <span class="balance-amount" id="user-balance">120,00 €</span>
    </div>

    <div id="scan-step">
        <p>Tippe unten, um den QR-Code vom iPad zu scannen:</p>
        <button id="start-btn" onclick="startCamera()">Kamera starten</button>
        <div id="interactive"></div>
    </div>

    <div id="pay-step" class="hidden">
        <p id="mode-text">Zu zahlender Betrag:</p>
        <div class="amount" id="display-amount">0,00 €</div>
        <button id="action-btn" onclick="processTransaction()">Bestätigen</button>
    </div>

    <div id="done-msg" class="msg-box done"></div>
    <div id="error-msg" class="msg-box error">
        ❌ Nicht genug Guthaben!
        <br><br>
        <button style="background:#dc2626;" onclick="resetApp()">Zurück</button>
    </div>
</div>

<script>
    // LocalStorage Initialisierung: Einmalig 120.00 € Guthaben
    if (localStorage.getItem('user_balance') === null) {
        localStorage.setItem('user_balance', '120.00');
    }

    let currentBalance = parseFloat(localStorage.getItem('user_balance'));
    let currentTopic = null;
    let currentAmount = 0;
    let currentMode = 'PAY'; // 'PAY' oder 'TOPUP'
    let html5QrCode = null;

    function updateBalanceDisplay() {
        document.getElementById('user-balance').innerText = currentBalance.toFixed(2) + ' €';
    }
    updateBalanceDisplay();

    async function startCamera() {
        document.getElementById('start-btn').style.display = 'none';
        html5QrCode = new Html5Qrcode("interactive");

        const qrCodeSuccessCallback = (decodedText) => {
            try {
                const data = JSON.parse(decodedText);
                if (data.topic && data.amount) {
                    currentTopic = data.topic;
                    currentAmount = parseFloat(data.amount);
                    currentMode = data.mode || 'PAY';

                    document.getElementById('display-amount').innerText = currentAmount.toFixed(2) + ' €';

                    if (currentMode === 'TOPUP') {
                        document.getElementById('mode-text').innerText = "Guthaben das aufgeladen wird:";
                        document.getElementById('action-btn').innerText = "Guthaben Aufladen";
                        document.getElementById('action-btn').style.background = "#16a34a";
                    } else {
                        document.getElementById('mode-text').innerText = "Zu zahlender Betrag:";
                        document.getElementById('action-btn').innerText = "Jetzt Bezahlen";
                        document.getElementById('action-btn').style.background = "#0284c7";
                    }
                    
                    html5QrCode.stop().then(() => {
                        document.getElementById('scan-step').classList.add('hidden');
                        document.getElementById('pay-step').classList.remove('hidden');
                    });
                }
            } catch (e) {
                console.log("Kein gültiger Kassen-Code");
            }
        };

        html5QrCode.start(
            { facingMode: "environment" }, 
            { fps: 10, qrbox: { width: 220, height: 220 } }, 
            qrCodeSuccessCallback
        ).catch(err => {
            alert("Kamera-Fehler! Bitte Berechtigungen prüfen.");
            document.getElementById('start-btn').style.display = 'block';
        });
    }

    function processTransaction() {
        if (!currentTopic) return;

        // Prüfen, ob bei der Bezahlung genügend Guthaben da ist
        if (currentMode === 'PAY' && currentBalance < currentAmount) {
            document.getElementById('pay-step').classList.add('hidden');
            document.getElementById('error-msg').style.display = 'block';
            return;
        }

        // Guthaben berechnen
        if (currentMode === 'TOPUP') {
            currentBalance += currentAmount;
        } else {
            currentBalance -= currentAmount;
        }

        // Neues Guthaben im LocalStorage speichern
        localStorage.setItem('user_balance', currentBalance.toFixed(2));
        updateBalanceDisplay();

        // Bestätigungssignal an das iPad senden
        fetch(`https://ntfy.sh/${currentTopic}`, {
            method: 'POST',
            body: 'PAID'
        }).then(() => {
            document.getElementById('pay-step').classList.add('hidden');
            const doneBox = document.getElementById('done-msg');
            
            if (currentMode === 'TOPUP') {
                doneBox.innerHTML = `🎉 ${currentAmount.toFixed(2)} € aufgeladen!<br><br><button style="background:#16a34a;" onclick="resetApp()">Fertig</button>`;
            } else {
                doneBox.innerHTML = `✅ Geld abgebucht!<br><br><button style="background:#16a34a;" onclick="resetApp()">Nächste Zahlung</button>`;
            }
            doneBox.style.display = 'block';
        });
    }

    function resetApp() {
        document.getElementById('done-msg').style.display = 'none';
        document.getElementById('error-msg').style.display = 'none';
        document.getElementById('scan-step').classList.remove('hidden');
        document.getElementById('start-btn').style.display = 'block';
    }
</script>

</body>
</html>
