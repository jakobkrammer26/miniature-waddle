<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eisdiele Bezahlung</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            text-align: center;
            padding: 40px 20px;
            background: #f0f9ff;
            color: #0c4a6e;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 20px;
            border: 2px solid #bae6fd;
            box-shadow: 0 4px 15px rgba(2, 132, 199, 0.15);
            max-width: 360px;
            margin: 0 auto;
        }
        h1 { color: #0284c7; margin-top: 0; }
        .amount { font-size: 2.5rem; font-weight: bold; color: #0369a1; margin: 20px 0; }
        button {
            background: #0284c7;
            color: white;
            border: none;
            padding: 18px 30px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 14px;
            width: 100%;
            cursor: pointer;
        }
        button:active { background: #0369a1; }
        .done {
            background: #dcfce7;
            color: #16a34a;
            padding: 15px;
            border-radius: 12px;
            font-weight: bold;
            font-size: 1.3rem;
            margin-top: 15px;
            display: none;
        }
    </style>
</head>
<body>

<div class="card">
    <h1>🍦 Eisdiele Bezahlung</h1>
    <p>Zu zahlender Betrag:</p>
    <div class="amount" id="display-amount">0,00 €</div>
    
    <button id="pay-btn" onclick="payNow()">Jetzt Bezahlen</button>
    <div id="done-msg" class="done">✅ Geld abgebucht</div>
</div>

<script>
    // URL Parameter auslesen (Betrag und Topic-ID)
    const urlParams = new URLSearchParams(window.location.search);
    const topicId = urlParams.get('topic');
    const amount = urlParams.get('amount') || '0.00';

    document.getElementById('display-amount').innerText = amount + ' €';

    function payNow() {
        if (!topicId) {
            alert("Ungültiger Aufruf (keine Kasse-ID gefunden)!");
            return;
        }

        // Signal 'PAID' über ntfy.sh direkt an das iPad senden
        fetch(`https://ntfy.sh/${topicId}`, {
            method: 'POST',
            body: 'PAID'
        }).then(() => {
            // UI auf dem Handy aktualisieren
            document.getElementById('pay-btn').style.display = 'none';
            document.getElementById('done-msg').style.display = 'block';
        }).catch(err => {
            alert("Fehler beim Senden des Signals.");
        });
    }
</script>

</body>
</html>
